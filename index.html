<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Project Planner – Gantt</title>
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<style>
:root {
  --bg: #ffffff; --bg2: #f7f7f5; --bg3: #efefec;
  --text: #1a1a18; --text2: #6b6b66; --text3: #9b9b96;
  --border: rgba(0,0,0,0.1); --border2: rgba(0,0,0,0.18);
  --blue: #378ADD; --blue-dark: #185FA5; --blue-light: #E6F1FB;
  --green: #639922; --green-light: #EAF3DE;
  --amber: #EF9F27; --amber-light: #FAEEDA;
  --red: #E24B4A; --red-light: #FCEBEB;
  --purple: #534AB7; --purple-light: #EEEDFE;
  --gray: #B4B2A9; --gray-light: #F1EFE8;
  --radius: 8px; --radius-lg: 12px;
}
@media (prefers-color-scheme: dark) {
  :root {
    --bg: #1e1e1c; --bg2: #252523; --bg3: #2c2c2a;
    --text: #e8e8e2; --text2: #9b9b96; --text3: #6b6b66;
    --border: rgba(255,255,255,0.1); --border2: rgba(255,255,255,0.18);
    --blue-light: #0c2a44; --green-light: #172904;
    --amber-light: #2a1e04; --red-light: #2a0c0c;
    --purple-light: #1a1640; --gray-light: #252523;
  }
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);font-size:13px;line-height:1.4}
h1{font-size:18px;font-weight:500;margin-bottom:4px}
.app{padding:16px}
.header-bar{display:flex;align-items:center;gap:12px;margin-bottom:14px;flex-wrap:wrap}
.header-bar h1{margin:0}
.spacer{flex:1}
/* Toolbar */
.toolbar{display:flex;align-items:center;gap:7px;margin-bottom:12px;flex-wrap:wrap}
.btn{font-size:12px;padding:0 10px;border:0.5px solid var(--border2);border-radius:var(--radius);background:var(--bg);color:var(--text);cursor:pointer;height:30px;white-space:nowrap;display:inline-flex;align-items:center;gap:5px;transition:background .15s}
.btn:hover{background:var(--bg2)}
.btn.primary{background:var(--blue);color:#fff;border-color:var(--blue-dark)}
.btn.primary:hover{background:var(--blue-dark)}
.btn-group{display:flex;border:0.5px solid var(--border2);border-radius:var(--radius);overflow:hidden}
.btn-group .btn{border:none;border-radius:0;border-right:0.5px solid var(--border2)}
.btn-group .btn:last-child{border-right:none}
/* Gantt wrap */
#gantt-container{border:0.5px solid var(--border2);border-radius:var(--radius-lg);overflow:hidden;background:var(--bg)}
#gantt-scroll{overflow-x:auto}
#gantt-inner{display:flex}
/* Sidebar */
#sidebar{flex-shrink:0;width:280px;border-right:0.5px solid var(--border2);display:flex;flex-direction:column}
.sb-head{height:96px;display:flex;align-items:flex-end;border-bottom:0.5px solid var(--border2);background:var(--bg2)}
.sb-head-task{flex:1;padding:0 8px 8px 10px;font-size:11px;font-weight:600;color:var(--text2);text-transform:uppercase;letter-spacing:.05em}
.sb-head-pct{width:52px;text-align:center;padding:0 4px 8px;font-size:11px;font-weight:600;color:var(--text2);text-transform:uppercase;letter-spacing:.05em;border-left:0.5px solid var(--border)}
.sb-row{height:36px;display:flex;align-items:center;border-bottom:0.5px solid var(--border);position:relative}
.sb-row:hover .row-actions{opacity:1}
.sb-row.group-row{background:var(--bg3);height:32px}
.sb-row.selected-row .row-label{color:var(--blue)}
.sb-task-part{flex:1;display:flex;align-items:center;gap:4px;overflow:hidden;padding:0 4px 0 8px;min-width:0}
.row-indent{flex-shrink:0}
.row-icon{width:16px;height:16px;flex-shrink:0;display:flex;align-items:center;justify-content:center}
.row-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.row-label{overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex:1;cursor:pointer;font-size:12px}
.row-label:hover{color:var(--blue)}
.row-res{font-size:10px;color:var(--text3);flex-shrink:0;max-width:50px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.row-actions{opacity:0;display:flex;gap:1px;flex-shrink:0;padding-right:3px;transition:opacity .15s}
.ra{width:20px;height:20px;border-radius:4px;border:none;background:transparent;cursor:pointer;font-size:11px;display:flex;align-items:center;justify-content:center;color:var(--text2)}
.ra:hover{background:var(--bg2);color:var(--text)}
.ra.del:hover{background:var(--red-light);color:var(--red)}
.sb-pct-cell{width:52px;flex-shrink:0;border-left:0.5px solid var(--border);display:flex;align-items:center;justify-content:center}
.pct-badge{font-size:11px;font-weight:500;padding:2px 5px;border-radius:10px}
/* Chart area */
#chart-area{flex:1;min-width:0}
#header-svg,#gantt-svg{display:block}
/* Dep lines */
.dep-line{fill:none;stroke:#888780;stroke-width:1.2;stroke-dasharray:4 3;opacity:0.5}
.today-line{stroke:var(--red);stroke-width:1.5;stroke-dasharray:4 3;opacity:0.8}
/* Tooltip */
#tooltip{position:fixed;pointer-events:none;background:var(--bg);border:0.5px solid var(--border2);border-radius:var(--radius);padding:8px 12px;font-size:12px;color:var(--text);opacity:0;transition:opacity .12s;z-index:1000;max-width:220px;box-shadow:0 4px 12px rgba(0,0,0,.12)}
/* Modal */
.modal-backdrop{display:none;position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:500;align-items:flex-start;justify-content:center;padding-top:60px}
.modal-backdrop.open{display:flex}
.modal{background:var(--bg);border:0.5px solid var(--border2);border-radius:var(--radius-lg);padding:20px;width:360px;max-width:96vw;max-height:80vh;overflow-y:auto}
.modal h3{font-size:14px;font-weight:500;margin-bottom:14px}
.form-row{margin-bottom:10px}
.form-row label{display:block;font-size:11px;color:var(--text2);margin-bottom:3px;font-weight:500;text-transform:uppercase;letter-spacing:.04em}
.form-row input,.form-row select,.form-row textarea{width:100%;font-size:13px;padding:6px 9px;border:0.5px solid var(--border2);border-radius:var(--radius);background:var(--bg);color:var(--text);height:34px}
.form-row textarea{height:auto;resize:vertical}
.form-row input[type=range]{height:18px;padding:0}
.form-row input[type=color]{height:34px;padding:2px 4px;cursor:pointer}
.form-row .pct-row{display:flex;align-items:center;gap:8px}
.form-row .pct-row input[type=range]{flex:1}
.form-row .pct-row span{min-width:30px;font-size:13px;font-weight:500;text-align:right}
.modal-btns{display:flex;gap:8px;margin-top:16px;justify-content:flex-end}
.modal-btns .btn{height:34px}
.modal-btns .btn.ok{background:var(--blue);color:#fff;border-color:var(--blue-dark)}
.modal-btns .btn.ok:hover{background:var(--blue-dark)}
/* Icon picker */
.icon-grid{display:grid;grid-template-columns:repeat(8,1fr);gap:4px;margin-top:4px}
.icon-opt{width:32px;height:32px;border:0.5px solid var(--border);border-radius:6px;cursor:pointer;display:flex;align-items:center;justify-content:center;background:var(--bg2);transition:all .12s}
.icon-opt:hover,.icon-opt.selected{background:var(--blue-light);border-color:var(--blue)}
/* Resource tags */
.res-tags{display:flex;flex-wrap:wrap;gap:4px;margin-top:4px}
.res-tag{display:flex;align-items:center;gap:4px;background:var(--bg2);border:0.5px solid var(--border);border-radius:10px;padding:2px 8px 2px 5px;font-size:12px}
.res-tag .rm{cursor:pointer;color:var(--text3);font-size:14px;line-height:1}
.res-tag .rm:hover{color:var(--red)}
.res-input-row{display:flex;gap:6px;margin-top:6px}
.res-input-row input{flex:1}
.res-input-row .btn{flex-shrink:0;height:34px}
/* Legend */
#legend{display:flex;gap:12px;flex-wrap:wrap;margin-top:10px;font-size:11px;color:var(--text2);align-items:center}
.leg-item{display:flex;align-items:center;gap:4px}
.leg-sw{width:11px;height:11px;border-radius:2px}
.leg-dia{width:9px;height:9px;transform:rotate(45deg)}
/* Detail panel */
#detail-panel{margin-top:12px;border:0.5px solid var(--border);border-radius:var(--radius-lg);padding:12px 14px;display:none}
#detail-panel h3{font-size:13px;font-weight:500;margin-bottom:8px}
.dg{display:grid;grid-template-columns:auto 1fr;gap:5px 14px;font-size:12px}
.dl{color:var(--text2)}.dv{font-weight:500}
.pbw{background:var(--bg2);border-radius:3px;height:5px;overflow:hidden;margin-top:2px}
.pbf{height:100%;border-radius:3px;transition:width .3s}
/* Res avatars */
.avatar-row{display:flex;gap:3px;flex-wrap:wrap;margin-top:3px}
.avatar{width:20px;height:20px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:8px;font-weight:600;color:#fff;background:var(--blue);flex-shrink:0}
</style>
</head>
<body>
<div class="app">

<div class="header-bar">
  <h1>Project Planner</h1>
  <span style="font-size:12px;color:var(--text3)" id="today-label"></span>
  <div class="spacer"></div>
</div>

<div class="toolbar">
  <div class="btn-group">
    <button class="btn" onclick="zoom(-1)">− zoom</button>
    <button class="btn" onclick="zoom(1)">+ zoom</button>
  </div>
  <button class="btn primary" onclick="openAddModal(null)">
    <svg width="11" height="11" viewBox="0 0 11 11" fill="none"><path d="M5.5 1v9M1 5.5h9" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
    Aggiungi task
  </button>
  <div class="btn-group">
    <button class="btn" onclick="exportXLSX()">
      <svg width="13" height="13" viewBox="0 0 13 13" fill="none"><rect x="1" y="1" width="11" height="11" rx="2" stroke="#639922" stroke-width="1"/><path d="M3.5 4.5L6.5 8.5M9.5 4.5L6.5 8.5" stroke="#639922" stroke-width="1.2" stroke-linecap="round"/></svg>Excel
    </button>
    <button class="btn" onclick="exportPDF()">
      <svg width="13" height="13" viewBox="0 0 13 13" fill="none"><rect x="1" y="1" width="11" height="11" rx="2" stroke="#E24B4A" stroke-width="1"/><path d="M4 4h3.5a1.5 1.5 0 010 3H4V4zM4 7h5" stroke="#E24B4A" stroke-width="1.1" stroke-linecap="round"/></svg>PDF
    </button>
    <button class="btn" onclick="exportPNG()">
      <svg width="13" height="13" viewBox="0 0 13 13" fill="none"><rect x="1" y="1" width="11" height="11" rx="2" stroke="#378ADD" stroke-width="1"/><circle cx="4.5" cy="4.5" r="1" fill="#378ADD"/><path d="M1 9l3-3 2 2 2-2.5 3 3.5" stroke="#378ADD" stroke-width="1.1" stroke-linecap="round" stroke-linejoin="round"/></svg>PNG
    </button>
  </div>
  <span style="font-size:11px;color:var(--text3);margin-left:auto">Trascina le barre · Maniglie per ridimensionare</span>
</div>

<div id="gantt-container">
  <div id="gantt-scroll">
    <div id="gantt-inner">
      <div id="sidebar">
        <div class="sb-head">
          <div class="sb-head-task">Task / Progetto</div>
          <div class="sb-head-pct">%</div>
        </div>
        <div id="sb-rows"></div>
      </div>
      <div id="chart-area">
        <svg id="header-svg"></svg>
        <svg id="gantt-svg"></svg>
      </div>
    </div>
  </div>
</div>

<div id="tooltip"></div>

<div id="legend">
  <span style="font-weight:600">Legenda:</span>
  <div class="leg-item"><div class="leg-sw" style="background:#378ADD"></div>On-going</div>
  <div class="leg-item"><div class="leg-sw" style="background:#639922"></div>Done</div>
  <div class="leg-item"><div class="leg-sw" style="background:#EF9F27"></div>Stand-by</div>
  <div class="leg-item"><div class="leg-sw" style="background:#B4B2A9"></div>Not started</div>
  <div class="leg-item"><div class="leg-dia" style="background:#534AB7"></div>Milestone</div>
  <div class="leg-item"><div class="leg-sw" style="background:#C8DCEF;border:0.5px solid #aac"></div>Weekend</div>
  <div class="leg-item"><div class="leg-sw" style="background:#fce8e8;border:0.5px solid #daa"></div>Festività</div>
</div>

<div id="detail-panel">
  <h3 id="dp-title"></h3>
  <div class="dg" id="dp-grid"></div>
</div>

<!-- ADD/EDIT MODAL -->
<div class="modal-backdrop" id="modal-overlay">
  <div class="modal">
    <h3 id="modal-title">Nuovo task</h3>

    <div class="form-row">
      <label>Nome</label>
      <input id="f-name" type="text" placeholder="Nome attività…">
    </div>

    <div class="form-row">
      <label>Progetto</label>
      <select id="f-proj"></select>
    </div>

    <div class="form-row">
      <label>Tipo</label>
      <select id="f-type" onchange="onTypeChange()">
        <option value="task">Task principale</option>
        <option value="subtask">Subtask</option>
        <option value="milestone">Milestone</option>
      </select>
    </div>

    <div class="form-row" id="f-parent-row" style="display:none">
      <label>Task padre</label>
      <select id="f-parent"></select>
    </div>

    <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px">
      <div class="form-row">
        <label>Inizio</label>
        <input id="f-start" type="date">
      </div>
      <div class="form-row" id="f-end-row">
        <label>Fine</label>
        <input id="f-end" type="date">
      </div>
    </div>

    <div class="form-row" id="f-prog-row">
      <label>Avanzamento</label>
      <div class="pct-row">
        <input id="f-prog" type="range" min="0" max="100" value="0" step="1" oninput="document.getElementById('f-prog-val').textContent=this.value+'%'">
        <span id="f-prog-val">0%</span>
      </div>
    </div>

    <div class="form-row">
      <label>Stato</label>
      <select id="f-status">
        <option value="todo">Not started</option>
        <option value="active">On-going</option>
        <option value="standby">Stand-by</option>
        <option value="done">Done</option>
      </select>
    </div>

    <div class="form-row">
      <label>Colore barra</label>
      <div style="display:flex;gap:8px;align-items:center">
        <input id="f-color" type="color" value="#378ADD" style="width:48px;flex-shrink:0">
        <div style="display:flex;gap:5px;flex-wrap:wrap">
          <div class="color-preset" style="background:#378ADD" onclick="pickColor('#378ADD')"></div>
          <div class="color-preset" style="background:#639922" onclick="pickColor('#639922')"></div>
          <div class="color-preset" style="background:#534AB7" onclick="pickColor('#534AB7')"></div>
          <div class="color-preset" style="background:#EF9F27" onclick="pickColor('#EF9F27')"></div>
          <div class="color-preset" style="background:#E24B4A" onclick="pickColor('#E24B4A')"></div>
          <div class="color-preset" style="background:#D4537E" onclick="pickColor('#D4537E')"></div>
          <div class="color-preset" style="background:#1D9E75" onclick="pickColor('#1D9E75')"></div>
          <div class="color-preset" style="background:#888780" onclick="pickColor('#888780')"></div>
        </div>
      </div>
    </div>

    <style>
      .color-preset{width:22px;height:22px;border-radius:4px;cursor:pointer;border:1.5px solid transparent;transition:border-color .12s}
      .color-preset:hover{border-color:rgba(0,0,0,.3)}
    </style>

    <div class="form-row">
      <label>Icona</label>
      <div class="icon-grid" id="icon-grid"></div>
    </div>

    <div class="form-row">
      <label>Risorse assegnate</label>
      <div id="res-tags" class="res-tags"></div>
      <div class="res-input-row">
        <input id="f-res-input" type="text" placeholder="Nome risorsa…" onkeydown="if(event.key==='Enter'){addResource();event.preventDefault()}">
        <button class="btn" onclick="addResource()">+ Aggiungi</button>
      </div>
    </div>

    <div class="modal-btns">
      <button class="btn" onclick="closeModal()">Annulla</button>
      <button class="btn ok" onclick="saveModal()">Salva</button>
    </div>
  </div>
</div>

<!-- DEMOTE MODAL -->
<div class="modal-backdrop" id="demote-overlay">
  <div class="modal" style="width:300px">
    <h3>Scegli task padre</h3>
    <div class="form-row">
      <label>Task principale</label>
      <select id="demote-parent"></select>
    </div>
    <div class="modal-btns">
      <button class="btn" onclick="closeDemote()">Annulla</button>
      <button class="btn ok" onclick="saveDemote()">Conferma</button>
    </div>
  </div>
</div>

<script>
// ─── CONFIG ───────────────────────────────────────────
const ROW_H = 36, HDR_H = 96, HANDLE_W = 8;
let DAY_W = 22;
const TODAY = new Date(2025, 3, 8);
const START_DATE = new Date(2025, 2, 1);
const TOTAL_DAYS = 90;

document.getElementById('today-label').textContent = 'Oggi: ' + TODAY.toLocaleDateString('it-IT', {weekday:'long',day:'2-digit',month:'long',year:'numeric'});

// ─── HELPERS ──────────────────────────────────────────
const D = (y,m,day) => new Date(y,m,day);
const addDays = (dt,n) => { let r=new Date(dt); r.setDate(r.getDate()+n); return r; };
const diffDays = (a,b) => Math.round((b-a)/86400000);
const fmtDate = dt => dt.toLocaleDateString('it-IT',{day:'2-digit',month:'short'});
const toISO = dt => dt.toISOString().slice(0,10);
const fromISO = s => { const p=s.split('-'); return new Date(+p[0],+p[1]-1,+p[2]); };
const isoKey = dt => dt.getFullYear()+'-'+(dt.getMonth()+1)+'-'+dt.getDate();
const uid = () => 't'+Date.now()+Math.random().toString(36).slice(2,6);

// ─── FESTIVITÀ ────────────────────────────────────────
const FEST = new Set(['2025-1-1','2025-1-6','2025-4-18','2025-4-20','2025-4-21','2025-4-25','2025-5-1','2025-6-2','2025-8-15','2025-11-1','2025-12-8','2025-12-25','2025-12-26']);
const isFest = dt => FEST.has(isoKey(dt));
const isWE = dt => { const d=dt.getDay(); return d===0||d===6; };
const DAY_LBL = ['d','l','m','m','g','v','s'];

function getDayBg(dt) {
  if(isFest(dt)) return '#fce8e8';
  const cols = ['#dde8f4','#f5f5f5','#efefef','#e9e9e9','#e3e3e3','#dcdcdc','#ccd9ea'];
  return cols[dt.getDay()];
}
function getDayBorder(dt) {
  if(isFest(dt)) return '#e5b8b8';
  return isWE(dt) ? '#aac4de' : '#d8d8d8';
}

// ─── ICONS ────────────────────────────────────────────
const ICONS = {
  none:    {label:'—',      svg:''},
  flag:    {label:'Flag',   svg:'<path d="M4 2v12M4 2l7 3-7 3" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round" fill="none"/>'},
  gear:    {label:'Gear',   svg:'<path d="M8 8a2 2 0 100-4 2 2 0 000 4z" stroke="currentColor" stroke-width="1.2" fill="none"/><path d="M8 1v1.5M8 9.5V11M1 6h1.5M9.5 6H11M2.5 2.5l1 1M8.5 8.5l1 1M9.5 2.5l-1 1M3.5 8.5l-1 1" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/>'},
  rocket:  {label:'Rocket', svg:'<path d="M6 10C4 9 3 7 3 5c0-2 2-4 3-4s3 2 3 4c0 2-1 4-3 5z" stroke="currentColor" stroke-width="1.2" fill="none"/><path d="M4 9l-1.5 2.5M8 9l1.5 2.5M6 5v2" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/>'},
  warning: {label:'Alert',  svg:'<path d="M6 1L11 10H1L6 1z" stroke="currentColor" stroke-width="1.2" fill="none" stroke-linejoin="round"/><path d="M6 5v2.5M6 9v.5" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/>'},
  check:   {label:'Check',  svg:'<circle cx="6" cy="6" r="5" stroke="currentColor" stroke-width="1.2" fill="none"/><path d="M3.5 6l2 2 3-3" stroke="currentColor" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round" fill="none"/>'},
  bug:     {label:'Bug',    svg:'<path d="M6 9a3 3 0 110-6 3 3 0 010 6z" stroke="currentColor" stroke-width="1.2" fill="none"/><path d="M6 3V1.5M3 4L1.5 3M9 4l1.5-1M3 8L1 9M9 8l2 1M3 6H1M9 6h2M6 9v2" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/>'},
  doc:     {label:'Doc',    svg:'<path d="M3 1h5l2 2v9H3V1z" stroke="currentColor" stroke-width="1.2" fill="none" stroke-linejoin="round"/><path d="M8 1v2h2M4.5 5.5h3M4.5 7.5h3M4.5 9.5h1.5" stroke="currentColor" stroke-width="1.1" stroke-linecap="round"/>'},
  chart:   {label:'Chart',  svg:'<rect x="1.5" y="1.5" width="9" height="9" rx="1" stroke="currentColor" stroke-width="1.1" fill="none"/><path d="M3.5 8V6M6 8V4M8.5 8V5.5" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/>'},

// ─── ROWS ─────────────────────────────────────────────
function buildRows() {
  const rows = [];
  PROJECTS.forEach(p => {
    rows.push({type:'group', proj:p});
    tasks.filter(t => t.proj===p.id && !t.parentId).forEach(t => {
      rows.push({type:'task', task:t, proj:p, indent:0});
      tasks.filter(s => s.parentId===t.id).forEach(s => {
        rows.push({type:'task', task:s, proj:p, indent:1});
      });
    });
  });
  return rows;
}

// ─── SIDEBAR ──────────────────────────────────────────
function pctBadge(p, status) {
  let bg = '#f0f0f0', fg = '#555';
  if(p===100||status==='done'){bg='#EAF3DE';fg='#3B6D11';}
  else if(status==='standby'){bg='#FAEEDA';fg='#854F0B';}
  else if(p>0){bg='#E6F1FB';fg='#185FA5';}
  return `<span class="pct-badge" style="background:${bg};color:${fg}">${p}%</span>`;
}

function avatarInitials(name) {
  return name.split(' ').map(w=>w[0]).join('').toUpperCase().slice(0,2);
}
function avatarColor(name) {
  const colors=['#378ADD','#639922','#534AB7','#EF9F27','#D4537E','#1D9E75'];
  let h=0; for(let c of name)h=(h*31+c.charCodeAt(0))%colors.length;
  return colors[Math.abs(h)%colors.length];
}

// ─── HEADER ───────────────────────────────────────────
function renderHeader() {
  const svg = document.getElementById('header-svg');
  const W = svgW();
  svg.setAttribute('viewBox', `0 0 ${W} ${HDR_H}`);
  svg.setAttribute('height', HDR_H);
  svg.setAttribute('width', W);

  let h = '';

  // Day backgrounds
  for(let i=0;i<TOTAL_DAYS;i++){
    const dt = addDays(START_DATE,i);
    const x = i*DAY_W;
    h += `<rect x="${x}" y="0" width="${DAY_W}" height="${HDR_H}" fill="${getDayBg(dt)}"/>`;
    h += `<line x1="${x}" y1="0" x2="${x}" y2="${HDR_H}" stroke="${getDayBorder(dt)}" stroke-width="0.5"/>`;
  }
  h += `<line x1="${W}" y1="0" x2="${W}" y2="${HDR_H}" stroke="rgba(0,0,0,0.18)" stroke-width="0.5"/>`;
  h += `<line x1="0" y1="0" x2="${W}" y2="0" stroke="rgba(0,0,0,0.18)" stroke-width="0.5"/>`;

  // Month band (top 40px) – larger text, distinct bg
  let months = {};
  for(let i=0;i<TOTAL_DAYS;i++){
    const dt = addDays(START_DATE,i);
    const mk = dt.getFullYear()+'-'+dt.getMonth();
    if(!months[mk]) months[mk]={x:i*DAY_W, end:(i+1)*DAY_W, label:dt.toLocaleDateString('it-IT',{month:'long',year:'numeric'})};
    else months[mk].end=(i+1)*DAY_W;
  }
  Object.values(months).forEach(m => {
    h += `<rect x="${m.x}" y="0" width="${m.end-m.x}" height="40" fill="rgba(55,138,221,0.08)"/>`;
    h += `<line x1="${m.x}" y1="0" x2="${m.x}" y2="40" stroke="rgba(55,138,221,0.4)" stroke-width="1"/>`;
    h += `<text x="${m.x+8}" y="24" font-size="13" font-weight="600" fill="var(--text2)" dominant-baseline="central" font-family="-apple-system,sans-serif">${m.label.charAt(0).toUpperCase()+m.label.slice(1)}</text>`;
  });

  // Separator
  h += `<line x1="0" y1="40" x2="${W}" y2="40" stroke="rgba(0,0,0,0.18)" stroke-width="1"/>`;

  // Day cells (bottom 56px)
  for(let i=0;i<TOTAL_DAYS;i++){
    const dt = addDays(START_DATE,i);
    const x = i*DAY_W;
    const dow = dt.getDay();
    const lbl = DAY_LBL[dow];
    const we = isWE(dt), fe = isFest(dt);
    const tc = fe?'#a02020':we?'#185FA5':'rgba(0,0,0,0.45)';
    const fw = (we||fe)?'700':'400';
    h += `<text x="${x+DAY_W/2}" y="56" font-size="9" font-weight="${fw}" fill="${tc}" text-anchor="middle" dominant-baseline="central" font-family="-apple-system,sans-serif">${lbl}</text>`;
    h += `<text x="${x+DAY_W/2}" y="76" font-size="9" font-weight="${fw}" fill="${tc}" text-anchor="middle" dominant-baseline="central" font-family="-apple-system,sans-serif">${dt.getDate()}</text>`;
  }

  h += `<line x1="0" y1="${HDR_H-0.5}" x2="${W}" y2="${HDR_H-0.5}" stroke="rgba(0,0,0,0.18)" stroke-width="1"/>`;

  // Today
  const tx = diffDays(START_DATE,TODAY)*DAY_W+DAY_W/2;
  if(tx>=0&&tx<=W){
    h += `<line x1="${tx}" y1="40" x2="${tx}" y2="${HDR_H}" stroke="#E24B4A" stroke-width="1.5" stroke-dasharray="3 2" opacity="0.9"/>`;
  }

  svg.innerHTML = h;
}

// ─── GANTT SVG ────────────────────────────────────────
function renderGantt(rows) {
  const svg = document.getElementById('gantt-svg');
  const W = svgW(), H = rows.length*ROW_H;
  svg.setAttribute('viewBox', `0 0 ${W} ${H}`);
  svg.setAttribute('height', H);
  svg.setAttribute('width', W);

  let h = `<defs><marker id="da" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="5" markerHeight="5" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="#888780" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker></defs>`;

  // Column backgrounds + vertical gridlines
  for(let i=0;i<TOTAL_DAYS;i++){
    const dt = addDays(START_DATE,i);
    const x = i*DAY_W;
    h += `<rect x="${x}" y="0" width="${DAY_W}" height="${H}" fill="${getDayBg(dt)}"/>`;
    h += `<line x1="${x}" y1="0" x2="${x}" y2="${H}" stroke="${getDayBorder(dt)}" stroke-width="0.5"/>`;
  }
  h += `<line x1="${W}" y1="0" x2="${W}" y2="${H}" stroke="rgba(0,0,0,0.18)" stroke-width="0.5"/>`;

  // Row separators
  rows.forEach((_,i) => {
    h += `<line x1="0" y1="${(i+1)*ROW_H}" x2="${W}" y2="${(i+1)*ROW_H}" stroke="rgba(0,0,0,0.07)" stroke-width="0.5"/>`;
  });

  // Today
  const tx = diffDays(START_DATE,TODAY)*DAY_W+DAY_W/2;
  if(tx>=0&&tx<=W) h += `<line x1="${tx}" y1="0" x2="${tx}" y2="${H}" stroke="#E24B4A" stroke-width="1.5" stroke-dasharray="4 3" opacity="0.75"/>`;

  const taskMap = {};
  tasks.forEach(t => taskMap[t.id]=t);

  // Bars
  rows.forEach((r,i) => {
    if(r.type!=='task') return;
    const t = r.task;
    const y = i*ROW_H;
    const x = diffDays(START_DATE,t.start)*DAY_W;
    const dur = Math.max(1,diffDays(t.start,t.end));
    const w = dur*DAY_W;
    const col = t.color || STATUS_COLOR_MAP[t.status] || '#B4B2A9';
    const cy = y+ROW_H/2;
    const isSub = !!t.parentId;
    const sel = selectedTask===t.id;

    if(t.isMilestone){
      const s=13;
      h += `<g data-id="${t.id}">
        <polygon points="${x+DAY_W/2},${cy-s/2} ${x+DAY_W/2+s/2},${cy} ${x+DAY_W/2},${cy+s/2} ${x+DAY_W/2-s/2},${cy}"
          fill="${col}" opacity="0.9" stroke="${sel?'#000':col}" stroke-width="${sel?2:0.5}"/>
        ${iconSVG(t.icon,10,col) ? '' : ''}
      </g>`;
      // Milestone label
      h += `<text x="${x+DAY_W/2+s/2+4}" y="${cy}" font-size="10" fill="${col}" dominant-baseline="central" font-weight="600" font-family="-apple-system,sans-serif">${t.label}</text>`;
      return;
    }

    const barH = isSub ? 14 : 20;
    const barY = cy - barH/2;
    const rx = isSub ? 3 : 4;

    h += `<g class="task-bar" data-id="${t.id}">
      <rect x="${x+1}" y="${barY}" width="${Math.max(2,w-2)}" height="${barH}" rx="${rx}" fill="${col}" opacity="${isSub?0.68:0.9}" stroke="${sel?'rgba(0,0,0,0.5)':col}" stroke-width="${sel?2:0.5}"/>`;

    // Progress fill
    if(t.progress>0){
      const pw = Math.max(2,(t.progress/100)*(w-2));
      h += `<rect x="${x+1}" y="${barY}" width="${pw}" height="${barH}" rx="${rx}" fill="rgba(255,255,255,0.25)"/>`;
    }

    // Label on bar
    const labelFontSize = isSub ? 9 : 10;
    const minW = isSub ? 22 : 28;
    if(w > minW){
      const maxChars = Math.floor((w-12)/(labelFontSize*0.6));
      const lbl = t.label.length > maxChars ? t.label.slice(0,maxChars-1)+'…' : t.label;
      h += `<text x="${x+6}" y="${cy}" font-size="${labelFontSize}" font-weight="500" fill="white" dominant-baseline="central" style="pointer-events:none" font-family="-apple-system,sans-serif">${lbl}</text>`;
    }

    h += `<rect class="handle" data-id="${t.id}" data-side="left" x="${x+1}" y="${barY}" width="${HANDLE_W}" height="${barH}" style="cursor:ew-resize;fill:transparent"/>`;
    h += `<rect class="handle" data-id="${t.id}" data-side="right" x="${x+w-HANDLE_W-1}" y="${barY}" width="${HANDLE_W}" height="${barH}" style="cursor:ew-resize;fill:transparent"/>`;
    h += `<rect data-id="${t.id}" data-drag="move" x="${x+HANDLE_W+1}" y="${barY}" width="${Math.max(0,w-HANDLE_W*2-2)}" height="${barH}" fill="transparent" style="cursor:grab"/>`;
    h += `</g>`;
  });

  // Dependency lines
  rows.forEach((r,i) => {
    if(r.type!=='task'||!r.task.deps||!r.task.deps.length) return;
    r.task.deps.forEach(depId => {
      const dep = taskMap[depId]; if(!dep) return;
      const di = rows.findIndex(rr=>rr.type==='task'&&rr.task.id===depId); if(di<0) return;
      const x1 = diffDays(START_DATE,dep.end)*DAY_W+DAY_W/2;
      const y1 = di*ROW_H+ROW_H/2;
      const x2 = diffDays(START_DATE,r.task.start)*DAY_W+DAY_W/2;
      const y2 = i*ROW_H+ROW_H/2;
      h += `<path class="dep-line" d="M${x1},${y1} C${x1+14},${y1} ${x2-14},${y2} ${x2},${y2}" marker-end="url(#da)"/>`;
    });
  });

  svg.innerHTML = h;
  attachEvents(svg);
}

// ─── EVENTS ───────────────────────────────────────────
function attachEvents(svg){
  svg.querySelectorAll('[data-drag="move"]').forEach(el=>{
    el.addEventListener('mousedown',onDragStart);
    el.addEventListener('touchstart',onTS,{passive:false});
  });
  svg.querySelectorAll('.handle').forEach(el=>{
    el.addEventListener('mousedown',onResizeStart);
    el.addEventListener('touchstart',onTRS,{passive:false});
  });
  svg.querySelectorAll('[data-id]').forEach(el=>{
    el.addEventListener('click',e=>{const id=e.currentTarget.dataset.id;if(id)selectTask(id);});
    el.addEventListener('mouseenter',e=>showTip(e,el.dataset.id));
    el.addEventListener('mouseleave',hideTip);
  });
}

function onDragStart(e){
  e.preventDefault();
  const t=getT(e.target.dataset.id); if(!t||t.isMilestone) return;
  dragState={type:'move',id:t.id,startX:e.clientX,origStart:new Date(t.start),origEnd:new Date(t.end)};
  window.addEventListener('mousemove',onDragMove); window.addEventListener('mouseup',onDragEnd);
}
function onResizeStart(e){
  e.preventDefault();
  const t=getT(e.target.dataset.id); if(!t||t.isMilestone) return;
  dragState={type:'resize',id:t.id,side:e.target.dataset.side,startX:e.clientX,origStart:new Date(t.start),origEnd:new Date(t.end)};
  window.addEventListener('mousemove',onDragMove); window.addEventListener('mouseup',onDragEnd);
}
function onTS(e){ const tc=e.touches[0]; onDragStart({preventDefault:()=>e.preventDefault(),clientX:tc.clientX,target:e.target}); window.addEventListener('touchmove',onTM,{passive:false}); window.addEventListener('touchend',onDragEnd); }
function onTRS(e){ const tc=e.touches[0]; onResizeStart({preventDefault:()=>e.preventDefault(),clientX:tc.clientX,target:e.target}); window.addEventListener('touchmove',onTM,{passive:false}); window.addEventListener('touchend',onDragEnd); }
function onTM(e){ e.preventDefault(); onDragMove({clientX:e.touches[0].clientX}); }
function onDragMove(e){
  if(!dragState) return;
  const t=getT(dragState.id); if(!t) return;
  const dd=Math.round((e.clientX-dragState.startX)/DAY_W);
  if(dragState.type==='move'){ t.start=addDays(dragState.origStart,dd); t.end=addDays(dragState.origEnd,dd); }
  else if(dragState.side==='right'){ const ne=addDays(dragState.origEnd,dd); if(diffDays(t.start,ne)>=1)t.end=ne; }
  else { const ns=addDays(dragState.origStart,dd); if(diffDays(ns,t.end)>=1)t.start=ns; }
  rerender();
}
function onDragEnd(){
  dragState=null;
  window.removeEventListener('mousemove',onDragMove); window.removeEventListener('mouseup',onDragEnd);
  window.removeEventListener('touchmove',onTM); window.removeEventListener('touchend',onDragEnd);
  if(selectedTask) selectTask(selectedTask);
}

// ─── TASK ACTIONS ─────────────────────────────────────
function selectTask(id){
  selectedTask=id;
  const t=getT(id); if(!t) return;
  document.getElementById('detail-panel').style.display='block';
  document.getElementById('dp-title').innerHTML = (t.icon&&t.icon!=='none'?iconSVG(t.icon,14,t.color)+' ':'')+t.label;
  const dur=diffDays(t.start,t.end);
  let g=`<span class="dl">Inizio</span><span class="dv">${fmtDate(t.start)}</span>
    <span class="dl">Fine</span><span class="dv">${fmtDate(t.end)}</span>
    <span class="dl">Durata</span><span class="dv">${dur} giorni</span>
    <span class="dl">Stato</span><span class="dv">${STATUS_LABEL[t.status]||t.status}</span>`;
  if(!t.isMilestone) g+=`<span class="dl">Avanzamento</span><span class="dv"><div class="pbw"><div class="pbf" style="width:${t.progress}%;background:${t.color||STATUS_COLOR_MAP[t.status]}"></div></div>${t.progress}%</span>`;
  if(t.parentId){const par=getT(t.parentId); g+=`<span class="dl">Subtask di</span><span class="dv">${par?par.label:t.parentId}</span>`;}
  if(t.resources&&t.resources.length){
    const avs=t.resources.map(r=>`<div class="avatar" style="background:${avatarColor(r)}" title="${r}">${avatarInitials(r)}</div>`).join('');
    g+=`<span class="dl">Risorse</span><span class="dv"><div class="avatar-row">${avs}</div></span>`;
  }
  if(t.deps&&t.deps.length){const dn=t.deps.map(d=>{const dt=getT(d);return dt?dt.label:d}).join(', ');g+=`<span class="dl">Dipende da</span><span class="dv">${dn}</span>`;}
  document.getElementById('dp-grid').innerHTML=g;
  rerender();
}

function deleteTask(id){
  tasks=tasks.filter(t=>t.id!==id&&t.parentId!==id);
  if(selectedTask===id){selectedTask=null;document.getElementById('detail-panel').style.display='none';}
  rerender();
}
function promoteTask(id){ const t=getT(id); if(t) t.parentId=null; rerender(); }

// ─── MODAL ────────────────────────────────────────────
function buildIconGrid(){
  const grid=document.getElementById('icon-grid');
  grid.innerHTML='';
  Object.entries(ICONS).forEach(([key,ic])=>{
    const div=document.createElement('div');
    div.className='icon-opt'+(selectedIcon===key?' selected':'');
    div.title=ic.label;
    div.innerHTML=key==='none'?'<span style="font-size:10px;color:var(--text3)">—</span>':iconSVG(key,14,'var(--text)');
    div.onclick=()=>{selectedIcon=key;buildIconGrid();};
    grid.appendChild(div);
  });
}

function pickColor(hex){ document.getElementById('f-color').value=hex; }

function addResource(){
  const inp=document.getElementById('f-res-input');
  const val=inp.value.trim(); if(!val) return;
  if(!modalResources.includes(val)) modalResources.push(val);
  inp.value='';
  renderResourceTags();
}
function removeResource(name){
  modalResources=modalResources.filter(r=>r!==name);
  renderResourceTags();
}
function renderResourceTags(){
  document.getElementById('res-tags').innerHTML=modalResources.map(r=>`<div class="res-tag"><div class="avatar" style="background:${avatarColor(r)};width:16px;height:16px;font-size:7px">${avatarInitials(r)}</div>${r}<span class="rm" onclick="removeResource('${r}')">&times;</span></div>`).join('');
}

function onTypeChange(){
  const type=document.getElementById('f-type').value;
  document.getElementById('f-parent-row').style.display=type==='subtask'?'block':'none';
  document.getElementById('f-end-row').style.display=type==='milestone'?'none':'block';
  document.getElementById('f-prog-row').style.display=type==='milestone'?'none':'block';
  if(type==='subtask') updateParentOptions();
}
function updateParentOptions(){
  const projId=document.getElementById('f-proj').value;
  const par=document.getElementById('f-parent');
  const opts=tasks.filter(t=>t.proj===projId&&!t.parentId&&!t.isMilestone&&t.id!==editingId);
  par.innerHTML=opts.map(t=>`<option value="${t.id}">${t.label}</option>`).join('');
}

function openAddModal(projId){
  editingId=null;
  document.getElementById('modal-title').textContent='Nuovo task';
  const fproj=document.getElementById('f-proj');
  fproj.innerHTML=PROJECTS.map(p=>`<option value="${p.id}"${p.id===projId?' selected':''}>${p.label}</option>`).join('');
  document.getElementById('f-type').value='task';
  document.getElementById('f-name').value='';
  document.getElementById('f-start').value=toISO(TODAY);
  document.getElementById('f-end').value=toISO(addDays(TODAY,7));
  document.getElementById('f-prog').value=0;
  document.getElementById('f-prog-val').textContent='0%';
  document.getElementById('f-status').value='todo';
  document.getElementById('f-color').value='#378ADD';
  modalResources=[];
  selectedIcon='none';
  renderResourceTags();
  buildIconGrid();
  onTypeChange();
  document.getElementById('modal-overlay').classList.add('open');
  setTimeout(()=>document.getElementById('f-name').focus(),100);
}

function openEditModal(id){
  editingId=id;
  const t=getT(id); if(!t) return;
  document.getElementById('modal-title').textContent='Modifica: '+t.label;
  const fproj=document.getElementById('f-proj');
  fproj.innerHTML=PROJECTS.map(p=>`<option value="${p.id}"${p.id===t.proj?' selected':''}>${p.label}</option>`).join('');
  document.getElementById('f-type').value=t.isMilestone?'milestone':t.parentId?'subtask':'task';
  document.getElementById('f-name').value=t.label;
  document.getElementById('f-start').value=toISO(t.start);
  document.getElementById('f-end').value=toISO(t.end);
  document.getElementById('f-prog').value=t.progress;
  document.getElementById('f-prog-val').textContent=t.progress+'%';
  document.getElementById('f-status').value=t.status==='milestone'?'todo':t.status;
  document.getElementById('f-color').value=t.color||'#378ADD';
  modalResources=[...(t.resources||[])];
  selectedIcon=t.icon||'none';
  renderResourceTags();
  buildIconGrid();
  onTypeChange();
  updateParentOptions();
  if(t.parentId) document.getElementById('f-parent').value=t.parentId;
  document.getElementById('modal-overlay').classList.add('open');
}

function closeModal(){ document.getElementById('modal-overlay').classList.remove('open'); editingId=null; }

function saveModal(){
  const name=document.getElementById('f-name').value.trim();
  const proj=document.getElementById('f-proj').value;
  const type=document.getElementById('f-type').value;
  const parentId=type==='subtask'?document.getElementById('f-parent').value:null;
  const startVal=fromISO(document.getElementById('f-start').value);
  const endVal=type==='milestone'?new Date(startVal):fromISO(document.getElementById('f-end').value);
  const progress=parseInt(document.getElementById('f-prog').value)||0;
  const status=type==='milestone'?'milestone':document.getElementById('f-status').value;
  const color=document.getElementById('f-color').value;
  const icon=selectedIcon;
  const resources=[...modalResources];

  if(!name){document.getElementById('f-name').focus();return;}

  if(editingId){
    const t=getT(editingId);
    if(t){Object.assign(t,{label:name,proj,parentId,start:startVal,end:endVal,progress,status,color,icon,resources,isMilestone:type==='milestone'});}
  } else {
    tasks.push({id:uid(),proj,label:name,start:startVal,end:endVal,progress,status,color,icon,resources,deps:[],parentId,isMilestone:type==='milestone'});
  }
  closeModal();
  rerender();
}

// ─── DEMOTE ───────────────────────────────────────────
function openDemoteModal(id){
  demoteTarget=id;
  const t=getT(id);
  const opts=tasks.filter(p=>p.proj===t.proj&&p.id!==id&&!p.parentId&&!p.isMilestone);
  document.getElementById('demote-parent').innerHTML=opts.map(p=>`<option value="${p.id}">${p.label}</option>`).join('');
  document.getElementById('demote-overlay').classList.add('open');
}
function closeDemote(){ document.getElementById('demote-overlay').classList.remove('open'); demoteTarget=null; }
function saveDemote(){
  const t=getT(demoteTarget);
  if(t){ t.parentId=document.getElementById('demote-parent').value; }
  closeDemote(); rerender();
}

// ─── TOOLTIP ──────────────────────────────────────────
function showTip(e,id){
  if(!id) return;
  const t=getT(id); if(!t) return;
  const tip=document.getElementById('tooltip');
  const dur=diffDays(t.start,t.end);
  const resHtml=t.resources&&t.resources.length?`<div style="margin-top:4px;color:var(--text2)">${t.resources.join(', ')}</div>`:'';
  tip.innerHTML=`<strong style="font-size:12px">${t.label}</strong><br>${fmtDate(t.start)} → ${fmtDate(t.end)}<br>${dur} giorni${t.isMilestone?'':' · '+t.progress+'%'}<br><span style="color:${t.color||'#888'}">${STATUS_LABEL[t.status]||''}</span>${resHtml}`;
  tip.style.opacity='1';
  tip.style.left=(e.clientX+14)+'px';
  tip.style.top=(e.clientY-10)+'px';
}
function hideTip(){ document.getElementById('tooltip').style.opacity='0'; }

// ─── ZOOM & RERENDER ──────────────────────────────────
function zoom(dir){ DAY_W=Math.max(12,Math.min(60,DAY_W+dir*4)); rerender(); }

function rerender(){
  const rows=buildRows();
  renderSidebar(rows);
  renderHeader();
  renderGantt(rows);
}

// ─── EXPORTS ──────────────────────────────────────────
function exportXLSX(){
  if(typeof XLSX==='undefined'){alert('Caricamento libreria…');return;}
  const rows=buildRows();
  const data=[['Progetto','Task','Tipo','Icona','Inizio','Fine','Durata gg','Avanzamento %','Stato','Risorse','Subtask di','Colore']];
  rows.forEach(r=>{
    if(r.type!=='task') return;
    const t=r.task;
    const proj=PROJECTS.find(p=>p.id===t.proj);
    const par=t.parentId?getT(t.parentId)?.label:'';
    const tipo=t.isMilestone?'Milestone':t.parentId?'Subtask':'Task';
    data.push([proj?.label||'',t.label,tipo,t.icon||'',fmtDate(t.start),fmtDate(t.end),diffDays(t.start,t.end),t.progress,STATUS_LABEL[t.status]||t.status,(t.resources||[]).join(', '),par,t.color||'']);
  });
  const ws=XLSX.utils.aoa_to_sheet(data);
  ws['!cols']=[{wch:22},{wch:26},{wch:12},{wch:10},{wch:12},{wch:12},{wch:12},{wch:16},{wch:14},{wch:22},{wch:22},{wch:10}];
  const wb=XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb,'Gantt',ws);
  XLSX.writeFile(wb,'gantt_planner.xlsx');
}

function exportPNG(){
  if(typeof html2canvas==='undefined'){alert('Caricamento libreria…');return;}
  html2canvas(document.getElementById('gantt-container'),{scale:2,backgroundColor:'#ffffff',useCORS:true}).then(canvas=>{
    const a=document.createElement('a');
    a.download='gantt_planner.png';
    a.href=canvas.toDataURL('image/png');
    a.click();
  });
}

function exportPDF(){
  if(typeof html2canvas==='undefined'||typeof window.jspdf==='undefined'){alert('Caricamento librerie…');return;}
  html2canvas(document.getElementById('gantt-container'),{scale:1.5,backgroundColor:'#ffffff',useCORS:true}).then(canvas=>{
    const {jsPDF}=window.jspdf;
    const imgW=297, imgH=(canvas.height/canvas.width)*imgW;
    const pdf=new jsPDF({orientation:'landscape',unit:'mm',format:'a4'});
    const pageH=210; let y=0;
    while(y<imgH){ if(y>0)pdf.addPage(); pdf.addImage(canvas.toDataURL('image/png'),'PNG',0,-y,imgW,imgH); y+=pageH; }
    pdf.save('gantt_planner.pdf');
  });
}

// ─── CLOSE MODALS ON BACKDROP CLICK ───────────────────
document.getElementById('modal-overlay').addEventListener('click',e=>{ if(e.target===e.currentTarget) closeModal(); });
document.getElementById('demote-overlay').addEventListener('click',e=>{ if(e.target===e.currentTarget) closeDemote(); });
document.getElementById('f-proj').addEventListener('change',updateParentOptions);

// ─── INIT ─────────────────────────────────────────────
rerender();
</script>
